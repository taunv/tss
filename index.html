<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSS v3.0 - Hệ Thống Tính toán - Mô phỏng Giao Thông</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-39CJH29BDL"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-39CJH29BDL', { transport_type: 'beacon' });
    </script>

    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --red: #ef4444;
            --yellow: #f59e0b;
            --green: #10b981;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(56, 189, 248, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(56, 189, 248, 0.05) 0%, transparent 40%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            z-index: 1;
        }

        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .company-name {
            font-size: 12px;
            letter-spacing: 2px;
            color: var(--accent);
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .app-title {
            font-size: 20px;
            font-weight: 600;
            margin: 0;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--green);
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-top: 10px;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--green);
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        .traffic-light-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 60px;
            margin: 25px 0;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .light {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #1e293b;
            position: relative;
            transition: all 0.4s ease;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.5);
        }

        .light.red.active { background: var(--red); box-shadow: 0 0 30px var(--red), inset 0 0 10px rgba(255,255,255,0.4); }
        .light.yellow.active { background: var(--yellow); box-shadow: 0 0 30px var(--yellow), inset 0 0 10px rgba(255,255,255,0.4); }
        .light.green.active { background: var(--green); box-shadow: 0 0 30px var(--green), inset 0 0 10px rgba(255,255,255,0.4); }

        .console {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 15px;
            height: 100px;
            font-size: 11px;
            line-height: 1.6;
            color: var(--text-dim);
            overflow-y: hidden;
            border-left: 3px solid var(--accent);
            margin-bottom: 20px;
        }

        .log-entry { margin-bottom: 4px; }
        .log-entry span { color: var(--accent); }

        .progress-container { margin-bottom: 10px; }
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            margin-bottom: 8px;
            color: var(--text-dim);
        }

        .progress-track {
            height: 6px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #0ea5e9, #38bdf8);
            box-shadow: 0 0 10px var(--accent);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .footer {
            text-align: center;
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 20px;
        }

        .footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        /* Fallback nếu tắt JS */
        noscript .container { display: none; }
        noscript .fallback-msg { text-align: center; padding: 50px; }
    </style>
</head>

<body>

<div class="container">
    <div class="glass-panel">
        <div class="header">
            <div class="company-name">Công ty CP TV&XD Đà Rồng</div>
            <h1 class="app-title">TSS Control Panel</h1>
            <div class="status-badge">
                <span class="dot"></span> TÍNH TOÁN - MÔ PHỎNG GIAO THÔNG
            </div>
        </div>

        <div class="traffic-light-container">
            <div id="red" class="light red"></div>
            <div id="yellow" class="light yellow"></div>
            <div id="green" class="light green"></div>
        </div>

        <div id="log" class="console"></div>

        <div class="progress-container">
            <div class="progress-label">
                <span id="status-text">Đang khởi tạo...</span>
                <span id="percent-text">0%</span>
            </div>
            <div class="progress-track">
                <div id="bar" class="progress-bar"></div>
            </div>
        </div>

        <div class="footer">
            Hệ thống tự động chuyển hướng, hoặc <a id="manual" href="#">Bấm tại đây</a>
        </div>
    </div>
</div>

<noscript>
    <div class="fallback-msg">
        <p>Đang chuyển hướng... Nếu không tự động, hãy bấm vào link bên dưới:</p>
        <a href="https://script.google.com/macros/s/AKfycbwKyE88FWTX__W5htclQ3yaCNmRymeE-rXuuIMF4sOpvZXHrt9kBPfS_AoKBqcJFgasqA/exec">Tiếp tục tới ứng dụng</a>
    </div>
</noscript>

<script>
(function(){
    const BASE_URL = "https://script.google.com/macros/s/AKfycbwKyE88FWTX__W5htclQ3yaCNmRymeE-rXuuIMF4sOpvZXHrt9kBPfS_AoKBqcJFgasqA/exec";
    const finalUrl = BASE_URL + (window.location.search || "");
    
    let step = 0;
    const steps = [
        "INITIALIZING CORE...",
        "AUTHENTICATING CONTROLLER",
        "SYNCING SIGNAL DATABASE",
        "UPDATING TRAFFIC PHASE",
        "ESTABLISHING CONNECTION",
        "READY"
    ];

    const cycle = ["red", "green", "yellow"];
    let cycleIndex = 0;

    // Gán link cho nút bấm thủ công ngay lập tức
    document.getElementById("manual").href = finalUrl;

    function setLight(color){
        document.querySelectorAll(".light").forEach(el => el.classList.remove("active"));
        const target = document.getElementById(color);
        if(target) target.classList.add("active");
    }

    function runCycle(){
        setLight(cycle[cycleIndex]);
        cycleIndex = (cycleIndex + 1) % cycle.length;
    }

    function log(text){
        const box = document.getElementById("log");
        const timestamp = new Date().toLocaleTimeString('en-GB', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
        box.innerHTML += `<div class="log-entry"><span>[${timestamp}]</span> ${text}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function runSystem(){
        if(step < steps.length){
            const progress = Math.round(((step + 1) / steps.length) * 100);
            
            log(steps[step]);
            document.getElementById("status-text").innerText = steps[step];
            document.getElementById("percent-text").innerText = progress + "%";
            document.getElementById("bar").style.width = progress + "%";

            step++;
            setTimeout(runSystem, 600);
        } else {
            if (typeof gtag === "function") {
                gtag('event','redirect', { 'event_category':'outbound', 'event_label':finalUrl });
            }
            log("REDIRECTING TO APP...");
            
            // Chuyển hướng sau khi hoàn tất thanh loading
            setTimeout(() => {
                window.location.replace(finalUrl);
            }, 500); 
        }
    }

    // Khởi chạy
    setInterval(runCycle, 800);
    setTimeout(runSystem, 300);
})();
</script>

</body>
</html>
